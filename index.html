<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมกรอกยอดตามรายชื่อ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .highlight-row { background-color: #f0fdf4; transition: background-color 0.3s; }
        .updated-flash { animation: flash 1s; }
        @keyframes flash {
            0% { background-color: #bbf7d0; }
            100% { background-color: transparent; }
        }
        .readonly-amount {
            background-color: transparent;
            border: none;
            outline: none;
            cursor: default;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-700">ระบบจัดการยอดตามรายชื่อ</h1>
            <p class="text-gray-600 mt-2">กรอกยอดเฉพาะรายชื่อที่ตรงกับฐานข้อมูลเท่านั้น</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-8 border-t-4 border-blue-500">
            <label class="block text-sm font-semibold text-gray-700 mb-2">วางข้อมูลที่นี่ (ชื่อตามด้วยยอดเงิน)</label>
            <textarea id="inputArea" rows="5" class="w-full p-4 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition bg-blue-50/30" placeholder="คัดลอก ชื่อ ยอดเงิน มาวางที่นี่...&#10;ตัวอย่าง:&#10;นางสาวสลักใจ โพธิมา 500"></textarea>
            <div class="mt-4 flex gap-2">
                <button onclick="processData()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium shadow transition flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                    ประมวลผลข้อมูล
                </button>
                <button onclick="clearInputs()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium transition">
                    ล้างค่าทั้งหมด
                </button>
            </div>
            <div id="statusMsg" class="mt-3 text-sm hidden font-medium"></div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-700 italic">ตารางรายชื่อพนักงาน</h2>
            <button onclick="copyToClipboard()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow transition flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-1 4h3m-5 8h5m-5-4h5m4-4h1v1m0 4v1m0 4v1m-11-1h1"></path></svg>
                คัดลอกเฉพาะชื่อและยอดเงิน
            </button>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-100 text-gray-700 border-b">
                    <tr>
                        <th class="p-4 text-sm font-bold w-16 text-center">ลำดับ</th>
                        <th class="p-4 text-sm font-bold">ชื่อ-นามสกุล</th>
                        <th class="p-4 text-sm font-bold w-48 text-right">ยอดเงิน</th>
                    </tr>
                </thead>
                <tbody id="nameTable">
                    <!-- Rows will be generated by JS -->
                </tbody>
            </table>
        </div>

        <!-- Summary -->
        <div class="mt-6 flex justify-end">
            <div class="bg-white border-2 border-blue-600 p-4 rounded-xl shadow-sm px-8 text-right">
                <span class="text-gray-600 font-semibold uppercase text-xs block mb-1">ยอดรวมสุทธิ</span>
                <span id="totalAmount" class="text-3xl text-blue-700 font-bold">0</span>
                <span class="text-blue-700 font-bold ml-1">บาท</span>
            </div>
        </div>
    </div>

    <!-- Hidden element for clipboard copying -->
    <textarea id="tempCopyArea" class="fixed opacity-0 pointer-events-none"></textarea>

    <script>
        // Updated Master List (Added 3 new names at the end)
        const masterNames = [
            "นางสาวสลักใจ โพธิมา", "นางสาวกรวรรณ บัวแดง", "นางสาวโสรยา บุญประเสริฐ", "นางสาวรัชนี ใจดี",
            "นางสาวนิติกาญจน์ อินทร์เขาย้อย", "นางสาวกนกวรรณ อาดัม", "นางสาวฮิจเราะห นุชจำลอง", "นางสาวนิศรา บางใหญ่",
            "นางสาวปณิษฐา เจ๊ะดอเลาะ", "นางสาวณัฐชา มีผล", 
            "นายปุญญพัฒน์ คำหวาน", "นางสาวอรอุมา พลวงค์", "นางสาวอลินา บุญมาเลิศ", "นางสาวจิราพร หวนคนึง",
            "นายวิวรรธน์ วงศ์พิมพ์", "นางสาวสิริรัตน์ ว่องไว", "นายประพันธ์ แซ่หลี", "นางสาวพิมลดา ภูถมเงิน",
            "นางสาวจิตรา มีผล", "นางสาวกาญจนา อาดัม",
            "อัยดา บุญเลาะ", "วนัสนันท์ จิวานิชวรกุล", "อาทิตยา ทับทิม", "พิชชาพร คำภานนท์",
            "นางสาวธิญาพร จาดรัมย์", "นายเมธา จันทร์รังสี", "นางสาวโโชติภา ปรกติ"
        ];

        let currentData = masterNames.map(name => ({ name, amount: 0 }));

        function renderTable() {
            const tbody = document.getElementById('nameTable');
            tbody.innerHTML = '';
            let total = 0;

            currentData.forEach((item, index) => {
                const roundedAmount = Math.round(item.amount);
                total += roundedAmount;
                const row = document.createElement('tr');
                row.className = 'border-b hover:bg-gray-50 transition';
                row.id = `row-${index}`;
                row.innerHTML = `
                    <td class="p-4 text-center text-gray-400 text-sm">${index + 1}</td>
                    <td class="p-4 text-gray-800 font-medium">${item.name}</td>
                    <td class="p-4 text-right">
                        <input type="text" 
                               readonly
                               value="${roundedAmount > 0 ? roundedAmount.toLocaleString() : '-'}" 
                               class="readonly-amount w-32 text-right font-bold text-blue-600"
                               tabindex="-1">
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('totalAmount').innerText = Math.round(total).toLocaleString();
        }

        function processData() {
            const rawText = document.getElementById('inputArea').value;
            if (!rawText.trim()) {
                showStatus('กรุณาวางข้อมูลก่อนประมวลผล', 'error');
                return;
            }
            const lines = rawText.split('\n');
            let matchedCount = 0;
            let skippedCount = 0;

            lines.forEach(line => {
                if (!line.trim()) return;

                const parts = line.trim().split(/\s+/);
                if (parts.length < 2) return;

                const amountStr = parts[parts.length - 1].replace(/,/g, '');
                const amount = Math.round(parseFloat(amountStr));
                
                if (!isNaN(amount)) {
                    const inputNamePart = parts.slice(0, -1).join(' ').replace(/[:\-\=]/g, '').trim();
                    let isFound = false;

                    currentData.forEach((master, index) => {
                        const cleanMaster = master.name.replace(/\s/g, '');
                        const cleanInput = inputNamePart.replace(/\s/g, '');

                        if (cleanMaster === cleanInput || cleanMaster.includes(cleanInput) || cleanInput.includes(cleanMaster)) {
                            master.amount = amount;
                            matchedCount++;
                            isFound = true;
                            const row = document.getElementById(`row-${index}`);
                            row.classList.add('updated-flash');
                            setTimeout(() => row.classList.remove('updated-flash'), 1000);
                        }
                    });

                    if (!isFound) skippedCount++;
                }
            });

            renderTable();
            if (matchedCount > 0) {
                showStatus(`จับคู่สำเร็จ ${matchedCount} รายการ ${skippedCount > 0 ? `(ไม่พบในระบบ ${skippedCount} รายการ)` : ''}`, 'success');
            } else {
                showStatus(`ไม่พบรายชื่อที่ตรงกับฐานข้อมูล`, 'error');
            }
        }

        function copyToClipboard() {
            const textToCopy = currentData.map(item => {
                const amountText = item.amount > 0 ? Math.round(item.amount) : '0';
                return `${item.name}\t${amountText}`;
            }).join('\n');

            const tempTextArea = document.getElementById('tempCopyArea');
            tempTextArea.value = textToCopy;
            tempTextArea.select();
            
            try {
                document.execCommand('copy');
                showStatus('คัดลอกข้อมูลสำเร็จ (ชื่อ [Tab] ยอดเงิน)', 'success');
            } catch (err) {
                showStatus('ไม่สามารถคัดลอกได้ กรุณาลองใหม่', 'error');
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.className = `mt-3 text-sm ${type === 'success' ? 'text-green-600' : 'text-red-600'} block`;
            setTimeout(() => { el.className = 'hidden'; }, 3000);
        }

        function clearInputs() {
            document.getElementById('inputArea').value = '';
            currentData = masterNames.map(name => ({ name, amount: 0 }));
            renderTable();
            showStatus('ล้างข้อมูลทั้งหมดเรียบร้อยแล้ว', 'success');
        }

        window.onload = renderTable;
    </script>
</body>
</html>
